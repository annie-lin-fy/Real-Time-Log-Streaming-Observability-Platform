services:
  # [1] Producer: Automated Mock Log Generator
  log-generator:
    image: python:3.11-slim
    container_name: log-generator
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install kafka-python-ng && python -u script.py"
    restart: always
    depends_on:
      - kafka-broker

  # [2] Message Queue: Apache Kafka Broker (KRaft Mode 雙通道版)
  kafka-broker:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # 🔥 CRITICAL FIX
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # [3] Web UI: Kafka Cluster Management Dashboard
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'local-cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka-broker:9092'
    depends_on:
      - kafka-broker

  # [4] Storage Layer: Elasticsearch Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status'" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # [5] Consumer: Moves logs from Kafka to Elasticsearch (🎯 改回 build 模式)
  log-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-consumer
    restart: always
    depends_on:
      kafka-broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - ELASTICSEARCH_SERVER=http://elasticsearch:9200

  # [6] Kafka Exporter: Extracts Kafka metrics for Prometheus
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    hostname: kafka-exporter
    command: [ "--kafka.server=kafka-broker:9092" ]
    restart: always
    ports:
      - "9308:9308"
    depends_on:
      kafka-broker:
        condition: service_healthy

  # [7] Node Exporter: Host metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  # [8] Elasticsearch Exporter: Elasticsearch metrics for Prometheus
  elasticsearch-exporter:
    image: prometheuscommunity/elasticsearch-exporter:v1.6.0
    container_name: elasticsearch-exporter
    command:
      - '--es.uri=http://elasticsearch:9200'
      - '--es.all'
    depends_on:
      elasticsearch:
        condition: service_healthy

  # [9]: Prometheus: Monitoring & Alerting System
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    links:
      - kafka-exporter
      - node-exporter
      - elasticsearch-exporter
    depends_on:
      - node-exporter
      - kafka-exporter
      - elasticsearch-exporter

  # [10] Grafana: Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
